# Dev override layered on docker-compose.yml (see Makefile's ENVIRONMENT
# switch): re-adds live source/config bind mounts + --reload so editing
# services/*/src or config.yml takes effect without a rebuild.
#
# litellm and redis are NOT overridden - both always run the baked image;
# editing their configs needs a rebuild even in dev.
services:
  clickhouse-migrate:
    volumes:
      - ./services/webhook/src:/app/src:ro
      - ./services/webhook/config.yml:/app/config.yml:ro
      - ./services/clickhouse/migrations:/app/migrations:ro

  webhook:
    volumes:
      - ./services/webhook/src:/app/src:ro
      - ./services/webhook/config.yml:/app/config.yml:ro
    command: ["uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  webhook-worker:
    volumes:
      - ./services/webhook/src:/app/src:ro
      - ./services/webhook/config.yml:/app/config.yml:ro

  webhook-reparse:
    volumes:
      - ./services/webhook/src:/app/src:ro
      - ./services/webhook/config.yml:/app/config.yml:ro

  mcp-server:
    volumes:
      - ./services/mcp-server/src:/app/src:ro
      - ./services/mcp-server/config.yml:/app/config.yml:ro
    command: ["uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]

  grafana:
    entrypoint: ["/bin/sh", "/docker-entrypoint-custom.sh"]
    volumes:
      - ./services/grafana/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./services/grafana/config.yml:/etc/grafana/config.yml:ro
      - ./services/grafana/provisioning/datasources:/etc/grafana/provisioning-templates/datasources:ro
      - ./services/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./services/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./services/grafana/dashboards:/etc/grafana/dashboards
      - ./services/grafana/dashboards-health:/etc/grafana/dashboards-health
