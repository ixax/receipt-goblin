x-clickhouse-user: &clickhouse-user ${CLICKHOUSE_USER:-default}
x-clickhouse-password: &clickhouse-password ${CLICKHOUSE_PASSWORD:-changeme}
x-clickhouse-database: &clickhouse-database ${CLICKHOUSE_DATABASE:-default}
x-clickhouse-host: &clickhouse-host ${CLICKHOUSE_HOST:-clickhouse}
x-clickhouse-port: &clickhouse-port ${CLICKHOUSE_PORT:-8123}
x-clickhouse-http-port: &clickhouse-http-port ${CLICKHOUSE_HTTP_PORT:-8123}
x-clickhouse-native-port: &clickhouse-native-port ${CLICKHOUSE_NATIVE_PORT:-9000}

x-mcp-server-port: &mcp-server-port ${MCP_SERVER_PORT:-8001}
x-grafana-port: &grafana-port ${GRAFANA_PORT:-3000}

x-redis-host: &redis-host ${REDIS_HOST:-redis}
x-redis-port: &redis-port ${REDIS_PORT:-6379}

x-webhook-url: &webhook-url ${WEBHOOK_URL:-http://webhook:8000/api/v1/metrics}
x-webhook-port: &webhook-port ${WEBHOOK_PORT:-8010}

x-litellm-port: &litellm-port ${LITELLM_PORT:-4000}
x-litellm-master-key: &litellm-master-key ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY, e.g. in a .env file next to docker-compose.yml}
x-litellm-db-password: &litellm-db-password ${LITELLM_DB_PASSWORD:-changeme}
x-litellm-db-url: &litellm-db-url postgresql://litellm:${LITELLM_DB_PASSWORD:-changeme}@litellm-db:5432/litellm

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: receipt-goblin-clickhouse
    environment:
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DB: *clickhouse-database
    # 3.6x real observed peak (419MiB) - heaviest CPU user of the stack, the
    # analytical CTE/window-function panels can spike higher than idle usage.
    mem_limit: 2g
    ports:
      - target: 8123
        published: *clickhouse-http-port
      - target: 9000
        published: *clickhouse-native-port
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Runs automatically on first container start (empty data dir only) -
      # this is how schema.sql gets applied without a manual step.
      - ./services/clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      # Caps ClickHouse's own memory usage at 85% of the mem_limit above
      # (see services/clickhouse/config.d/memory.xml) instead of the host's RAM.
      - ./services/clickhouse/config.d/memory.xml:/etc/clickhouse-server/config.d/memory.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  grafana:
    image: grafana/grafana:13.1.0
    container_name: receipt-goblin-grafana
    ports:
      - target: 3000
        published: *grafana-port
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
    entrypoint: ["/bin/sh", "/docker-entrypoint-custom.sh"]
    mem_limit: 512m
    restart: always
    volumes:
      - grafana-data:/var/lib/grafana
      - ./services/grafana/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./services/grafana/config.yml:/etc/grafana/config.yml:ro
      - ./services/grafana/provisioning/datasources:/etc/grafana/provisioning-templates/datasources:ro
      - ./services/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - receipt-goblin

  mcp-server:
    # Builds the same prod image as services/mcp-server/Dockerfile (deps baked in via
    # its own RUN pip install layer), then overlays live source on top for
    # dev: ./src bind-mounted over the image's /app/src, and `command:`
    # overrides the Dockerfile's CMD to add --reload. Editing
    # services/mcp-server/src/server.py restarts uvicorn without a rebuild; changing
    # requirements.txt does need `docker compose build mcp-server`.
    build: ./services/mcp-server
    container_name: receipt-goblin-mcp-server
    volumes:
      - ./services/mcp-server/src:/app/src:ro
      - ./services/mcp-server/config.yml:/app/config.yml:ro
    command: ["uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - target: 8001
        published: *mcp-server-port
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
    mem_limit: 256m
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - receipt-goblin

  redis:
    # Queue between webhook (producer) and webhook-worker (consumer) - see
    # services/webhook/src/queue_client.py. Tuning lives in
    # services/redis/redis.conf, not here.
    image: redis:7-alpine
    container_name: receipt-goblin-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    mem_limit: 768m
    restart: always
    volumes:
      - redis-data:/data
      - ./services/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  webhook:
    # Builds the same prod image as services/webhook/Dockerfile (deps baked in via its
    # own RUN pip install layer), then overlays live source on top for dev:
    # ./src bind-mounted over the image's /app/src, and `command:` overrides
    # the Dockerfile's CMD to add --reload. Editing services/webhook/src/server.py
    # restarts uvicorn without a rebuild; changing requirements.txt does need
    # `docker compose build webhook`.
    build: ./services/webhook
    container_name: receipt-goblin-webhook
    volumes:
      - ./services/webhook/src:/app/src:ro
      - ./services/webhook/config.yml:/app/config.yml:ro
      # Captured payloads land here on the host, not just inside the
      # container - see services/webhook/src/server.py CAPTURE_DIR. Kept separate from
      # the src/ mount above since it's runtime output, not source.
      - ./services/webhook/captures:/app/captures
    command: ["uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - target: 8000
        published: *webhook-port
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
      REDIS_HOST: *redis-host
      REDIS_PORT: *redis-port
    mem_limit: 128m
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - receipt-goblin

  webhook-worker:
    # Same image as webhook (build: ./services/webhook builds it again from the same
    # Dockerfile/layer cache, not a separate image) - only `command:` differs.
    # Drains queue_client.STREAM_KEY in batches and does the actual
    # ClickHouse inserts - see services/webhook/src/worker.py.
    build: ./services/webhook
    container_name: receipt-goblin-webhook-worker
    volumes:
      - ./services/webhook/src:/app/src:ro
      - ./services/webhook/config.yml:/app/config.yml:ro
    command: ["python", "-m", "src.worker"]
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
      REDIS_HOST: *redis-host
      REDIS_PORT: *redis-port
    mem_limit: 256m
    restart: always
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - receipt-goblin

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: receipt-goblin-litellm
    ports:
      - target: 4000
        published: *litellm-port
    environment:
      WEBHOOK_URL: *webhook-url
      LITELLM_MASTER_KEY: *litellm-master-key
      DATABASE_URL: *litellm-db-url
    volumes:
      - ./services/litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      webhook:
        condition: service_healthy
      litellm-db:
        condition: service_healthy
    networks:
      - receipt-goblin

  litellm-db:
    image: postgres:16-alpine
    container_name: receipt-goblin-litellm-db
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: *litellm-db-password
      POSTGRES_DB: litellm
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 256m
    restart: always
    networks:
      - receipt-goblin

networks:
  receipt-goblin:
    driver: bridge

volumes:
  clickhouse-data:
  grafana-data:
  litellm-db-data:
  redis-data:
