x-clickhouse-user: &clickhouse-user ${CLICKHOUSE_USER:?set CLICKHOUSE_USER, e.g. in a .env file next to docker-compose.yml}
x-clickhouse-password: &clickhouse-password ${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD, e.g. in a .env file next to docker-compose.yml}
x-clickhouse-database: &clickhouse-database ${CLICKHOUSE_DATABASE:?set CLICKHOUSE_DATABASE, e.g. in a .env file next to docker-compose.yml}
x-clickhouse-host: &clickhouse-host ${CLICKHOUSE_HOST:-clickhouse}
x-clickhouse-port: &clickhouse-port ${CLICKHOUSE_PORT:-8123}
x-clickhouse-http-port: &clickhouse-http-port ${CLICKHOUSE_HTTP_PORT:-8123}
x-clickhouse-native-port: &clickhouse-native-port ${CLICKHOUSE_NATIVE_PORT:-9000}

x-mcp-server-port: &mcp-server-port ${MCP_SERVER_PORT:-8001}
x-grafana-port: &grafana-port ${GRAFANA_PORT:-3000}

x-redis-host: &redis-host ${REDIS_HOST:-redis}
x-redis-port: &redis-port ${REDIS_PORT:-6379}

x-webhook-url: &webhook-url ${WEBHOOK_URL:-http://webhook:8000/api/v1/metrics}
x-webhook-port: &webhook-port ${WEBHOOK_PORT:-8010}

x-litellm-port: &litellm-port ${LITELLM_PORT:-4000}
x-litellm-master-key: &litellm-master-key ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY, e.g. in a .env file next to docker-compose.yml}
x-litellm-db-password: &litellm-db-password ${LITELLM_DB_PASSWORD:?set LITELLM_DB_PASSWORD, e.g. in a .env file next to docker-compose.yml}
x-litellm-db-url: &litellm-db-url postgresql://litellm:${LITELLM_DB_PASSWORD:?set LITELLM_DB_PASSWORD, e.g. in a .env file next to docker-compose.yml}@litellm-db:5432/litellm
# Internal docker network address - litellm's container-internal port is
# fixed at 4000 (see the litellm service's `command:` below) regardless of
# LITELLM_PORT, which only remaps the host side. Used by webhook to call
# LiteLLM's /key/info when verifying hooks/report_git_branch.py's virtual key.
x-litellm-base-url: &litellm-base-url http://litellm:4000

# Langfuse self-hosted (LLM tracing/observability, fed by litellm's
# success_callback/failure_callback in services/litellm/config.yaml) - its
# own Postgres/ClickHouse/Redis/MinIO, kept fully separate from the
# agent-tracking stack above so schemas/versions never collide.
x-langfuse-port: &langfuse-port ${LANGFUSE_PORT:-3001}
x-langfuse-clickhouse-http-port: &langfuse-clickhouse-http-port ${LANGFUSE_CLICKHOUSE_HTTP_PORT:-8124}
x-langfuse-clickhouse-native-port: &langfuse-clickhouse-native-port ${LANGFUSE_CLICKHOUSE_NATIVE_PORT:-9001}
# Langfuse lives entirely behind the `langfuse` compose profile (opt-in -
# `docker compose --profile langfuse up -d`, see "Langfuse" in README.md) -
# unlike the rest of this file's required secrets, these fall back to empty
# defaults (not `:?`) so `docker compose up` with no Langfuse setup at all
# still works. Fill them in .env before enabling the profile.
x-langfuse-clickhouse-user: &langfuse-clickhouse-user ${LANGFUSE_CLICKHOUSE_USER:-langfuse}
x-langfuse-clickhouse-password: &langfuse-clickhouse-password ${LANGFUSE_CLICKHOUSE_PASSWORD:-}
x-langfuse-db-password: &langfuse-db-password ${LANGFUSE_DB_PASSWORD:-}
x-langfuse-db-url: &langfuse-db-url postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-}@langfuse-db:5432/langfuse
x-langfuse-redis-password: &langfuse-redis-password ${LANGFUSE_REDIS_PASSWORD:-}
x-langfuse-minio-user: &langfuse-minio-user ${LANGFUSE_MINIO_ROOT_USER:-minio}
x-langfuse-minio-password: &langfuse-minio-password ${LANGFUSE_MINIO_ROOT_PASSWORD:-}
x-langfuse-salt: &langfuse-salt ${LANGFUSE_SALT:-}
x-langfuse-encryption-key: &langfuse-encryption-key ${LANGFUSE_ENCRYPTION_KEY:-}
x-langfuse-nextauth-secret: &langfuse-nextauth-secret ${LANGFUSE_NEXTAUTH_SECRET:-}
# Internal docker network address - what litellm talks to (fixed
# container-internal port, same pattern as litellm-base-url above).
x-langfuse-base-url: &langfuse-base-url http://langfuse-web:3000

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: receipt-goblin-clickhouse
    environment:
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DB: *clickhouse-database
    # 3.6x real observed peak (419MiB) - heaviest CPU user of the stack, the
    # analytical CTE/window-function panels can spike higher than idle usage.
    mem_limit: 2g
    ports:
      - target: 8123
        published: *clickhouse-http-port
      - target: 9000
        published: *clickhouse-native-port
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Runs automatically on first container start (empty data dir only) -
      # this is how schema.sql gets applied without a manual step.
      - ./services/clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      # Caps ClickHouse's own memory usage at 85% of the mem_limit above
      # (see services/clickhouse/config.d/memory.xml) instead of the host's RAM.
      - ./services/clickhouse/config.d/memory.xml:/etc/clickhouse-server/config.d/memory.xml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  grafana:
    image: grafana/grafana:13.1.0
    container_name: receipt-goblin-grafana
    ports:
      - target: 3000
        published: *grafana-port
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
    entrypoint: ["/bin/sh", "/docker-entrypoint-custom.sh"]
    mem_limit: 1g
    restart: always
    volumes:
      - grafana-data:/var/lib/grafana
      - ./services/grafana/docker-entrypoint.sh:/docker-entrypoint-custom.sh:ro
      - ./services/grafana/config.yml:/etc/grafana/config.yml:ro
      - ./services/grafana/provisioning/datasources:/etc/grafana/provisioning-templates/datasources:ro
      - ./services/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - receipt-goblin

  mcp-server:
    # Builds the same prod image as services/mcp-server/Dockerfile (deps baked in via
    # its own RUN pip install layer), then overlays live source on top for
    # dev: ./src bind-mounted over the image's /app/src, and `command:`
    # overrides the Dockerfile's CMD to add --reload. Editing
    # services/mcp-server/src/server.py restarts uvicorn without a rebuild; changing
    # requirements.txt does need `docker compose build mcp-server`.
    build: ./services/mcp-server
    container_name: receipt-goblin-mcp-server
    volumes:
      - ./services/mcp-server/src:/app/src:ro
      - ./services/mcp-server/config.yml:/app/config.yml:ro
    command: ["uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    ports:
      - target: 8001
        published: *mcp-server-port
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
    mem_limit: 256m
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - receipt-goblin

  redis:
    # Queue between webhook (producer) and webhook-worker (consumer) - see
    # services/webhook/src/queue_client.py. Tuning lives in
    # services/redis/redis.conf, not here.
    image: redis:7-alpine
    container_name: receipt-goblin-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    mem_limit: 768m
    restart: always
    volumes:
      - redis-data:/data
      - ./services/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  webhook:
    # Builds the same prod image as services/webhook/Dockerfile (deps baked in via its
    # own RUN pip install layer), then overlays live source on top for dev:
    # ./src bind-mounted over the image's /app/src, and `command:` overrides
    # the Dockerfile's CMD to add --reload. Editing services/webhook/src/server.py
    # restarts uvicorn without a rebuild; changing requirements.txt does need
    # `docker compose build webhook`.
    build: ./services/webhook
    container_name: receipt-goblin-webhook
    volumes:
      - ./services/webhook/src:/app/src:ro
      - ./services/webhook/config.yml:/app/config.yml:ro
      # Captured payloads land here on the host, not just inside the
      # container - see services/webhook/src/server.py CAPTURE_DIR. Kept separate from
      # the src/ mount above since it's runtime output, not source.
      - ./services/webhook/captures:/app/captures
    command: ["uvicorn", "src.server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - target: 8000
        published: *webhook-port
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
      REDIS_HOST: *redis-host
      REDIS_PORT: *redis-port
      # For /key/info lookups when verifying hooks/report_git_branch.py's
      # Authorization header.
      LITELLM_MASTER_KEY: *litellm-master-key
      LITELLM_BASE_URL: *litellm-base-url
    mem_limit: 128m
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - receipt-goblin

  webhook-worker:
    # Same image as webhook (build: ./services/webhook builds it again from the same
    # Dockerfile/layer cache, not a separate image) - only `command:` differs.
    # Drains queue_client.STREAM_KEY in batches and does the actual
    # ClickHouse inserts - see services/webhook/src/worker.py.
    build: ./services/webhook
    container_name: receipt-goblin-webhook-worker
    volumes:
      - ./services/webhook/src:/app/src:ro
      - ./services/webhook/config.yml:/app/config.yml:ro
    command: ["python", "-m", "src.worker"]
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
      REDIS_HOST: *redis-host
      REDIS_PORT: *redis-port
      # worker.py never calls /key/info itself, but config.py is shared with
      # webhook (see AGENTS.md "every tunable lives in config.py") and reads
      # these with no fallback - unset here would crash worker.py on import.
      LITELLM_MASTER_KEY: *litellm-master-key
      LITELLM_BASE_URL: *litellm-base-url
    mem_limit: 256m
    restart: always
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - receipt-goblin

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: receipt-goblin-litellm
    ports:
      - target: 4000
        published: *litellm-port
    environment:
      WEBHOOK_URL: *webhook-url
      LITELLM_MASTER_KEY: *litellm-master-key
      DATABASE_URL: *litellm-db-url
      # Read by litellm's built-in "langfuse" success_callback/failure_callback
      # (services/litellm/config.yaml) - no callback_settings block needed,
      # unlike metrics_webhook, since langfuse is one of litellm's native
      # logging integrations and just reads these three env vars. Optional
      # (not `:?`), since Langfuse itself lives behind the `langfuse` compose
      # profile - if unset/langfuse-web isn't running, litellm just logs a
      # per-call callback error and otherwise works fine, see "Langfuse" in
      # README.md.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: *langfuse-base-url
    volumes:
      # Whole directory, not individual files - docker-entrypoint.sh merges
      # in whatever config.<name>.yaml files it finds there (e.g.
      # config.ollama.yaml, config.reranker.yaml - see their .tmpl
      # counterparts and "Remote model sources" under "LiteLLM" in
      # README.md), so adding a new remote model source is just dropping a
      # file next to config.yaml - no docker-compose.yml edit needed.
      - ./services/litellm:/app/litellm-config:ro
    entrypoint: ["/bin/sh", "/app/litellm-config/docker-entrypoint.sh"]
    command: ["--port", "4000"]
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      webhook:
        condition: service_healthy
      litellm-db:
        condition: service_healthy
    networks:
      - receipt-goblin

  litellm-db:
    image: postgres:16-alpine
    container_name: receipt-goblin-litellm-db
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: *litellm-db-password
      POSTGRES_DB: litellm
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 256m
    restart: always
    networks:
      - receipt-goblin

  langfuse-db:
    image: postgres:17-alpine
    container_name: receipt-goblin-langfuse-db
    profiles:
      - langfuse
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: *langfuse-db-password
      POSTGRES_DB: langfuse
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 256m
    restart: always
    networks:
      - receipt-goblin

  # A second, dedicated ClickHouse instance for Langfuse's own trace/
  # observation/score tables - intentionally not shared with the `clickhouse`
  # service above, which has its own schema.sql and is owned by webhook.
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: receipt-goblin-langfuse-clickhouse
    profiles:
      - langfuse
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: *langfuse-clickhouse-user
      CLICKHOUSE_PASSWORD: *langfuse-clickhouse-password
    mem_limit: 1g
    ports:
      - target: 8123
        published: *langfuse-clickhouse-http-port
      - target: 9000
        published: *langfuse-clickhouse-native-port
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  # S3-compatible blob store Langfuse uses for ingested events/media - not
  # published to the host, only langfuse-web/langfuse-worker talk to it.
  langfuse-minio:
    image: minio/minio:latest
    container_name: receipt-goblin-langfuse-minio
    profiles:
      - langfuse
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: *langfuse-minio-user
      MINIO_ROOT_PASSWORD: *langfuse-minio-password
    mem_limit: 256m
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: always
    networks:
      - receipt-goblin

  langfuse-redis:
    image: redis:7-alpine
    container_name: receipt-goblin-langfuse-redis
    profiles:
      - langfuse
    command: ["redis-server", "--requirepass", *langfuse-redis-password, "--maxmemory-policy", "noeviction"]
    mem_limit: 256m
    restart: always
    volumes:
      - langfuse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", *langfuse-redis-password, "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  # Async ingestion worker - langfuse-web writes incoming traces straight to
  # langfuse-minio and queues a reference on langfuse-redis; this drains that
  # queue and does the actual langfuse-clickhouse inserts. Not published to
  # the host, nothing calls it directly.
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: receipt-goblin-langfuse-worker
    profiles:
      - langfuse
    environment: &langfuse-env
      DATABASE_URL: *langfuse-db-url
      SALT: *langfuse-salt
      ENCRYPTION_KEY: *langfuse-encryption-key
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: *langfuse-clickhouse-user
      CLICKHOUSE_PASSWORD: *langfuse-clickhouse-password
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: *langfuse-redis-password
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: *langfuse-minio-user
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: *langfuse-minio-password
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: *langfuse-minio-user
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: *langfuse-minio-password
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
    mem_limit: 768m
    restart: always
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
    networks:
      - receipt-goblin

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: receipt-goblin-langfuse-web
    profiles:
      - langfuse
    environment:
      <<: *langfuse-env
      # Next.js standalone server.js binds to $HOSTNAME if set; Docker auto-sets
      # HOSTNAME to the container ID, so without this it listens only on the
      # container's actual IP - not localhost - and the healthcheck below
      # (and anything hitting localhost:3000) gets connection refused even
      # though the app is up and "Ready".
      HOSTNAME: "0.0.0.0"
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3001}
      NEXTAUTH_SECRET: *langfuse-nextauth-secret
      # Auto-provisions an org/project/admin user + the exact
      # LANGFUSE_PUBLIC_KEY/SECRET_KEY pair litellm authenticates with (see
      # the litellm service's environment above) on first boot only - see
      # "Langfuse" in README.md.
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-}
    # 1g OOM-killed the Next.js server during its init-scripts pass
    # (observed heap crash right after "MCP feature registered" logging) -
    # langfuse-web is a full Next.js app, notably heavier than this stack's
    # other services.
    mem_limit: 2g
    restart: always
    ports:
      - target: 3000
        published: *langfuse-port
    healthcheck:
      # 127.0.0.1, not localhost - the container has no IPv6 listener (see
      # HOSTNAME comment above), and "localhost" resolves to ::1 first here.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/public/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
    networks:
      - receipt-goblin

networks:
  receipt-goblin:
    driver: bridge

volumes:
  clickhouse-data:
  grafana-data:
  litellm-db-data:
  redis-data:
  langfuse-db-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:
  langfuse-redis-data:
