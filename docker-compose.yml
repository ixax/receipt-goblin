# App-facing identity, provisioned via SQL each `docker compose up` by
# clickhouse-migrate (migrate.py:_ensure_app_user) using the bootstrap
# identity below. Shared by webhook/worker/mcp-server/grafana/backup.
x-clickhouse-user: &clickhouse-user ${CLICKHOUSE_USER:?set CLICKHOUSE_USER, e.g. in a .env file next to docker-compose.yml}
x-clickhouse-password: &clickhouse-password ${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD, e.g. in a .env file next to docker-compose.yml}
x-clickhouse-database: &clickhouse-database ${CLICKHOUSE_DATABASE:?set CLICKHOUSE_DATABASE, e.g. in a .env file next to docker-compose.yml}
x-clickhouse-host: &clickhouse-host ${CLICKHOUSE_HOST:-clickhouse}
x-clickhouse-port: &clickhouse-port ${CLICKHOUSE_PORT:-8123}
x-clickhouse-http-port: &clickhouse-http-port ${CLICKHOUSE_HTTP_PORT:-8123}
x-clickhouse-native-port: &clickhouse-native-port ${CLICKHOUSE_NATIVE_PORT:-9000}
# Pins clickhouse's image and backup's apt-installed clickhouse-client to
# the same version so they can't drift (see both services' Dockerfiles).
x-clickhouse-version: &clickhouse-version ${CLICKHOUSE_VERSION:-24.8.14.39}
# Superuser the ClickHouse image creates itself at startup
# (CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1 below) - exists only to bootstrap
# *clickhouse-user via SQL. No application service connects as this user.
x-clickhouse-bootstrap-user: &clickhouse-bootstrap-user ${CLICKHOUSE_BOOTSTRAP_USER:?set CLICKHOUSE_BOOTSTRAP_USER, e.g. in a .env file next to docker-compose.yml}
x-clickhouse-bootstrap-password: &clickhouse-bootstrap-password ${CLICKHOUSE_BOOTSTRAP_PASSWORD:?set CLICKHOUSE_BOOTSTRAP_PASSWORD, e.g. in a .env file next to docker-compose.yml}

x-mcp-server-port: &mcp-server-port ${MCP_SERVER_PORT:-8001}
x-grafana-port: &grafana-port ${GRAFANA_PORT:-3000}

# Host root dir backup/restore scripts read/write ($BACKUP_DIR, default
# .backups - see services/backup/README.md). Used directly as
# ${BACKUP_DIR:-.backups} below, not via an anchor, since anchors can't be
# concatenated into a bind mount's host-side path.

x-redis-host: &redis-host ${REDIS_HOST:-redis}
x-redis-port: &redis-port ${REDIS_PORT:-6379}

x-webhook-url: &webhook-url ${WEBHOOK_URL:-http://webhook:8000/api/v1/metrics}
x-webhook-port: &webhook-port ${WEBHOOK_PORT:-8010}

x-litellm-port: &litellm-port ${LITELLM_PORT:-4000}
x-litellm-master-key: &litellm-master-key ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY, e.g. in a .env file next to docker-compose.yml}
x-litellm-db-password: &litellm-db-password ${LITELLM_DB_PASSWORD:?set LITELLM_DB_PASSWORD, e.g. in a .env file next to docker-compose.yml}
x-litellm-db-url: &litellm-db-url postgresql://litellm:${LITELLM_DB_PASSWORD:?set LITELLM_DB_PASSWORD, e.g. in a .env file next to docker-compose.yml}@litellm-db:5432/litellm
# Container-internal port is fixed at 4000 (baked into the Dockerfile CMD)
# regardless of LITELLM_PORT, which only remaps the host side. Used by
# webhook to call /key/info when verifying report_git_branch.py's key.
x-litellm-base-url: &litellm-base-url http://litellm:4000

# Langfuse (LLM tracing, fed by litellm's callbacks in config.yaml) - its
# own Postgres/ClickHouse/Redis/MinIO, kept separate so schemas never collide
# with the agent-tracking stack above.
x-langfuse-port: &langfuse-port ${LANGFUSE_PORT:-3001}
x-langfuse-clickhouse-http-port: &langfuse-clickhouse-http-port ${LANGFUSE_CLICKHOUSE_HTTP_PORT:-8124}
x-langfuse-clickhouse-native-port: &langfuse-clickhouse-native-port ${LANGFUSE_CLICKHOUSE_NATIVE_PORT:-9001}
# Langfuse lives behind the `langfuse` compose profile (opt-in, see
# "Langfuse" in README.md) - these default to empty, not `:?`, so a plain
# `docker compose up` still works with no Langfuse setup.
x-langfuse-clickhouse-user: &langfuse-clickhouse-user ${LANGFUSE_CLICKHOUSE_USER:-langfuse}
x-langfuse-clickhouse-password: &langfuse-clickhouse-password ${LANGFUSE_CLICKHOUSE_PASSWORD:-}
x-langfuse-db-password: &langfuse-db-password ${LANGFUSE_DB_PASSWORD:-}
x-langfuse-db-url: &langfuse-db-url postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-}@langfuse-db:5432/langfuse
x-langfuse-redis-password: &langfuse-redis-password ${LANGFUSE_REDIS_PASSWORD:-}
x-langfuse-minio-user: &langfuse-minio-user ${LANGFUSE_MINIO_ROOT_USER:-minio}
x-langfuse-minio-password: &langfuse-minio-password ${LANGFUSE_MINIO_ROOT_PASSWORD:-}
x-langfuse-salt: &langfuse-salt ${LANGFUSE_SALT:-}
x-langfuse-encryption-key: &langfuse-encryption-key ${LANGFUSE_ENCRYPTION_KEY:-}
x-langfuse-nextauth-secret: &langfuse-nextauth-secret ${LANGFUSE_NEXTAUTH_SECRET:-}
# Fixed container-internal port, same pattern as litellm-base-url above.
x-langfuse-base-url: &langfuse-base-url http://langfuse-web:3000

services:
  clickhouse:
    # Config (schema.sql, config.d/*.xml) is baked in at build time - a
    # change needs `docker compose build clickhouse`, not just a restart.
    build:
      context: ./services/clickhouse
      args:
        CLICKHOUSE_VERSION: *clickhouse-version
    container_name: receipt-goblin-clickhouse
    environment:
      # Bootstrap superuser only (see x-clickhouse-bootstrap-* above), not
      # the app identity. ACCESS_MANAGEMENT=1 lets clickhouse-migrate
      # provision *clickhouse-user via SQL; the image drops the "default"
      # account entirely in this mode.
      CLICKHOUSE_USER: *clickhouse-bootstrap-user
      CLICKHOUSE_PASSWORD: *clickhouse-bootstrap-password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_DB: *clickhouse-database
    # 3.6x observed peak (419MiB) - heaviest CPU user; analytical
    # CTE/window-function panels can spike well above idle.
    mem_limit: 4g
    ports:
      - target: 8123
        published: *clickhouse-http-port
      - target: 9000
        published: *clickhouse-native-port
    expose:
      # Metrics endpoint (config.d/prometheus.xml) - internal only, scraped
      # by Prometheus's `clickhouse` job.
      - "9363"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Backing disk for native BACKUP/RESTORE (backup_clickhouse.sh) - the
      # server writes/reads here directly, bind-mounted so files land on the
      # host. Data only; config.d/backups.xml pointing here is baked in.
      - ${BACKUP_DIR:-.backups}/clickhouse:/backups/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  clickhouse-migrate:
    # Runs migrate.py once per `docker compose up`: provisions the app user
    # via SQL, then applies any services/clickhouse/migrations/*.sql not yet
    # in schema_migrations. Idempotent, safe on every startup - see
    # migrate.py's docstring. webhook/worker wait on this so they never race
    # a migration with live inserts.
    # Build context is the repo root - see services/webhook/Dockerfile.
    build:
      context: .
      dockerfile: services/webhook/Dockerfile
    container_name: receipt-goblin-clickhouse-migrate
    restart: "no"
    environment:
      APP_ROLE: migrate
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      # Target app user this bootstraps into existence via SQL (see above).
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
      # Bootstrap superuser, used only for CREATE USER/GRANT above.
      CLICKHOUSE_BOOTSTRAP_USER: *clickhouse-bootstrap-user
      CLICKHOUSE_BOOTSTRAP_PASSWORD: *clickhouse-bootstrap-password
      LITELLM_MASTER_KEY: *litellm-master-key
      LITELLM_BASE_URL: *litellm-base-url
      # Unused by migrate.py, but config.py is shared with webhook and reads
      # these with no fallback - unset would crash on import.
      REDIS_HOST: *redis-host
      REDIS_PORT: *redis-port
    mem_limit: 256m
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - receipt-goblin

  grafana:
    # Config/dashboards baked into the image at build time - a change needs
    # `docker compose build grafana` in prod; docker-compose.dev.yml
    # bind-mounts them back for live editing.
    build: ./services/grafana
    container_name: receipt-goblin-grafana
    ports:
      - target: 3000
        published: *grafana-port
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
    mem_limit: 1g
    restart: always
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
    networks:
      - receipt-goblin

  mcp-server:
    # Prod image is self-contained (config.yml baked in). docker-compose.dev.yml
    # bind-mounts ./src over /app/src and adds `command: --reload` for live
    # editing; requirements.txt changes still need a rebuild either way.
    build: ./services/mcp-server
    container_name: receipt-goblin-mcp-server
    ports:
      - target: 8001
        published: *mcp-server-port
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
    mem_limit: 256m
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
    networks:
      - receipt-goblin

  redis:
    # Queue between webhook (producer) and webhook-worker (consumer) - see
    # queue_client.py. Tuning lives in redis.conf, baked in at build time -
    # no dev override for this one, rarely edited live.
    build: ./services/redis
    container_name: receipt-goblin-redis
    # Above redis.conf's maxmemory (1024mb) - headroom for Redis's own
    # overhead beyond the dataset.
    mem_limit: 1200m
    restart: always
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  webhook:
    # Prod image is self-contained (config.yml baked in; build context is
    # the repo root - see services/webhook/Dockerfile). docker-compose.dev.yml
    # bind-mounts ./src over /app/src and adds `command: --reload` for live
    # editing; requirements.txt changes still need a rebuild either way.
    build:
      context: .
      dockerfile: services/webhook/Dockerfile
    container_name: receipt-goblin-webhook
    volumes:
      # Captured payloads land on the host too, not just in-container - see
      # server.py's CAPTURE_DIR. Runtime output, so this stays mounted in
      # prod too (unlike source/config).
      - ./.capture:/app/captures
    ports:
      - target: 8000
        published: *webhook-port
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
      CAPTURE_ENABLED: "true"
      REDIS_HOST: *redis-host
      REDIS_PORT: *redis-port
      # For /key/info lookups verifying report_git_branch.py's auth header.
      LITELLM_MASTER_KEY: *litellm-master-key
      LITELLM_BASE_URL: *litellm-base-url
    mem_limit: 128m
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - receipt-goblin

  webhook-worker:
    # Same image as webhook, only APP_ROLE differs (docker-entrypoint.sh).
    # Drains queue_client.STREAM_KEY in batches and does the ClickHouse
    # inserts - see worker.py.
    build:
      context: .
      dockerfile: services/webhook/Dockerfile
    container_name: receipt-goblin-webhook-worker
    environment:
      APP_ROLE: worker
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
      REDIS_HOST: *redis-host
      REDIS_PORT: *redis-port
      # worker.py never calls /key/info, but config.py is shared with
      # webhook and reads these with no fallback - unset crashes on import.
      LITELLM_MASTER_KEY: *litellm-master-key
      LITELLM_BASE_URL: *litellm-base-url
    expose:
      - "9200"
    mem_limit: 256m
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "from src.queue_client import get_redis; get_redis().ping()"]
      interval: 5s
      timeout: 3s
      retries: 20
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - receipt-goblin

  webhook-reparse:
    # Same image as webhook/webhook-worker, CLI-only. Recomputes
    # calculated_type/calculated_payload for existing event_sources rows -
    # see reparse.py. Not started by `docker compose up` (profiles: tools) -
    # run via `make reparse`/`make reparse-all`.
    build:
      context: .
      dockerfile: services/webhook/Dockerfile
    container_name: receipt-goblin-webhook-reparse
    profiles:
      - tools
    environment:
      APP_ROLE: reparse
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_PORT: *clickhouse-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
      # reparse.py doesn't use LITELLM_*/REDIS_*, but config.py is shared
      # with webhook and reads them unconditionally - unset crashes on import.
      LITELLM_MASTER_KEY: *litellm-master-key
      LITELLM_BASE_URL: *litellm-base-url
      REDIS_HOST: *redis-host
      REDIS_PORT: *redis-port
      SESSION_ID: ${SESSION_ID:-}
    # reparse.py pages event_sources REPARSE_CHUNK_SIZE rows at a time
    # instead of buffering the whole table client-side, so this doesn't need
    # headroom for a full 300MB+ payload-text load.
    mem_limit: 256m
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
    networks:
      - receipt-goblin

  backup:
    # Backup/restore for clickhouse, litellm-db, grafana-data - see
    # services/backup/README.md. Not started by `docker compose up`
    # (profiles: tools) - run via `make backup-*`/`restore-*` or cron.
    # No docker exec/socket: clickhouse/litellm-db go over the network,
    # grafana-data is the same named volume the `grafana` service uses.
    build:
      context: ./services/backup
      args:
        CLICKHOUSE_VERSION: *clickhouse-version
    container_name: receipt-goblin-backup
    profiles:
      - tools
    volumes:
      - ${BACKUP_DIR:-.backups}:/backups
      - grafana-data:/var/lib/grafana
    environment:
      CLICKHOUSE_HOST: *clickhouse-host
      CLICKHOUSE_NATIVE_PORT: *clickhouse-native-port
      CLICKHOUSE_USER: *clickhouse-user
      CLICKHOUSE_PASSWORD: *clickhouse-password
      CLICKHOUSE_DATABASE: *clickhouse-database
      LITELLM_DB_PASSWORD: *litellm-db-password
    mem_limit: 256m
    depends_on:
      clickhouse:
        condition: service_healthy
      litellm-db:
        condition: service_healthy
    networks:
      - receipt-goblin

  litellm:
    # config.yaml/entrypoint baked into the image at build time - a change
    # needs `docker compose build litellm`, no dev override, rarely edited
    # live. user_configs/*.yaml stays bind-mounted below even in prod
    # (gitignored, may hold real secrets/hosts).
    build: ./services/litellm
    container_name: receipt-goblin-litellm
    ports:
      - target: 4000
        published: *litellm-port
    environment:
      WEBHOOK_URL: *webhook-url
      LITELLM_MASTER_KEY: *litellm-master-key
      DATABASE_URL: *litellm-db-url
      # Read by litellm's built-in langfuse callback (config.yaml) - one of
      # litellm's native integrations, so no callback_settings block needed.
      # Optional (not `:?`): Langfuse is opt-in (`langfuse` profile), and if
      # unset litellm just logs a per-call callback error and keeps working.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: *langfuse-base-url
    volumes:
      # docker-entrypoint.sh merges in any config.<name>.yaml found here
      # (e.g. config.ollama.yaml - see user_configs/config.yaml.tmpl).
      # Gitignored, may hold real hosts/keys, so stays bind-mounted even in
      # prod: a new remote model source is just drop-file + restart, no rebuild.
      - ./services/litellm/user_configs:/app/litellm-config/user_configs:ro
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      webhook:
        condition: service_healthy
      litellm-db:
        condition: service_healthy
    networks:
      - receipt-goblin

  litellm-db:
    image: postgres:16-alpine
    container_name: receipt-goblin-litellm-db
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: *litellm-db-password
      POSTGRES_DB: litellm
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 256m
    restart: always
    networks:
      - receipt-goblin

  prometheus:
    # Config baked in at build time - see prometheus.yml for scrape jobs.
    build: ./services/prometheus
    container_name: receipt-goblin-prometheus
    profiles:
      - observability
    mem_limit: 512m
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  blackbox:
    # Config baked in at build time - see config.yml for the http_2xx
    # module Prometheus's blackbox job uses.
    build: ./services/blackbox
    container_name: receipt-goblin-blackbox
    profiles:
      - observability
    mem_limit: 128m
    restart: unless-stopped
    expose:
      - "9115"
    networks:
      - receipt-goblin

  redis-exporter:
    # Stock image, server-level Redis stats only (memory, clients, commands).
    # Business-level stream metrics (queue depth, lag) come from
    # webhook-worker's own /metrics instead - redis_exporter can't see those.
    image: oliver006/redis_exporter:v1.66.0
    container_name: receipt-goblin-redis-exporter
    profiles:
      - observability
    environment:
      REDIS_ADDR: redis://redis:6379
    mem_limit: 128m
    restart: unless-stopped
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - receipt-goblin

  cadvisor:
    # Stock image. Read-only host mounts give cgroup/container state, not
    # config - exempt from the no-config-volume-mounts convention (same
    # class as alloy's docker.sock below). Broken under the
    # containerd-snapshotter storage driver (Docker Desktop default / Colima)
    # - kept anyway, see AGENTS.md "cAdvisor container-level metrics".
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: receipt-goblin-cadvisor
    profiles:
      - observability
    mem_limit: 256m
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  node-exporter:
    # CLI flags baked into the image, no compose `command:` override. Same
    # host-mount rationale as cadvisor - reports on the Docker Desktop Linux
    # VM on macOS, the real host on Linux.
    build: ./services/node-exporter
    container_name: receipt-goblin-node-exporter
    profiles:
      - observability
    mem_limit: 128m
    restart: unless-stopped
    expose:
      - "9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    networks:
      - receipt-goblin

  loki:
    # Config baked in at build time. Single-binary, filesystem-backed - no
    # object storage needed at this scale.
    build: ./services/loki
    container_name: receipt-goblin-loki
    profiles:
      - observability
    mem_limit: 512m
    restart: unless-stopped
    expose:
      - "3100"
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  alloy:
    # Config baked in at build time (config.alloy). Docker socket mount is a
    # system-socket exception to the no-config-volume-mounts convention -
    # needed for discovery.docker to tail every container's logs.
    build: ./services/alloy
    container_name: receipt-goblin-alloy
    profiles:
      - observability
    mem_limit: 256m
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - receipt-goblin

  langfuse-db:
    image: postgres:17-alpine
    container_name: receipt-goblin-langfuse-db
    profiles:
      - langfuse
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: *langfuse-db-password
      POSTGRES_DB: langfuse
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 256m
    restart: always
    networks:
      - receipt-goblin

  # Dedicated ClickHouse for Langfuse's own trace/observation/score tables -
  # not shared with the `clickhouse` service above, which is owned by webhook.
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: receipt-goblin-langfuse-clickhouse
    profiles:
      - langfuse
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: *langfuse-clickhouse-user
      CLICKHOUSE_PASSWORD: *langfuse-clickhouse-password
    mem_limit: 1g
    ports:
      - target: 8123
        published: *langfuse-clickhouse-http-port
      - target: 9000
        published: *langfuse-clickhouse-native-port
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  # S3-compatible blob store for Langfuse's ingested events/media - internal
  # only, only langfuse-web/langfuse-worker talk to it.
  langfuse-minio:
    # Startup logic (bucket precreate + minio invocation) baked into the
    # image - see Dockerfile + entrypoint.sh.
    build: ./services/langfuse-minio
    container_name: receipt-goblin-langfuse-minio
    profiles:
      - langfuse
    environment:
      MINIO_ROOT_USER: *langfuse-minio-user
      MINIO_ROOT_PASSWORD: *langfuse-minio-password
    mem_limit: 256m
    volumes:
      - langfuse-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: always
    networks:
      - receipt-goblin

  langfuse-redis:
    # Startup logic baked into the image (Dockerfile + entrypoint.sh) - reads
    # REDIS_PASSWORD at runtime and execs redis-server, since the password
    # is a runtime secret and can't be baked in.
    build: ./services/langfuse-redis
    container_name: receipt-goblin-langfuse-redis
    profiles:
      - langfuse
    environment:
      REDIS_PASSWORD: *langfuse-redis-password
    mem_limit: 256m
    restart: always
    volumes:
      - langfuse-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", *langfuse-redis-password, "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - receipt-goblin

  # Async ingestion worker - langfuse-web writes traces to langfuse-minio and
  # queues a reference on langfuse-redis; this drains the queue and does the
  # langfuse-clickhouse inserts. Internal only.
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: receipt-goblin-langfuse-worker
    profiles:
      - langfuse
    environment: &langfuse-env
      DATABASE_URL: *langfuse-db-url
      SALT: *langfuse-salt
      ENCRYPTION_KEY: *langfuse-encryption-key
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: *langfuse-clickhouse-user
      CLICKHOUSE_PASSWORD: *langfuse-clickhouse-password
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: *langfuse-redis-password
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: *langfuse-minio-user
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: *langfuse-minio-password
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: *langfuse-minio-user
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: *langfuse-minio-password
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
    mem_limit: 768m
    restart: always
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
    networks:
      - receipt-goblin

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: receipt-goblin-langfuse-web
    profiles:
      - langfuse
    environment:
      <<: *langfuse-env
      # Next.js binds to $HOSTNAME if set; Docker auto-sets it to the
      # container ID, so without this it listens only on the container IP,
      # not localhost - the healthcheck below gets connection refused.
      HOSTNAME: "0.0.0.0"
      NEXTAUTH_URL: http://localhost:${LANGFUSE_PORT:-3001}
      NEXTAUTH_SECRET: *langfuse-nextauth-secret
      # Auto-provisions an org/project/admin user + the LANGFUSE_PUBLIC/SECRET_KEY
      # pair litellm authenticates with, on first boot only - see README.md.
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-}
    # 1g OOM-killed Next.js during init-scripts (heap crash right after
    # "MCP feature registered") - langfuse-web is heavier than the rest of
    # this stack.
    mem_limit: 2g
    restart: always
    ports:
      - target: 3000
        published: *langfuse-port
    healthcheck:
      # 127.0.0.1, not localhost - no IPv6 listener here (see HOSTNAME
      # above), and localhost resolves to ::1 first.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/public/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
    networks:
      - receipt-goblin

networks:
  receipt-goblin:
    driver: bridge

volumes:
  clickhouse-data:
  grafana-data:
  litellm-db-data:
  redis-data:
  langfuse-db-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:
  langfuse-redis-data:
  prometheus-data:
  loki-data:
