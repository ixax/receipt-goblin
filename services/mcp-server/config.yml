# Read-only SQL validation for the `query` tool (src/server.py
# _validate_readonly_sql). Keep strict - there's no separate read-only
# ClickHouse user backing this; all services share one user.

# Tables this stack actually writes to - anything else (system.*, typos,
# etc.) is out of scope for `query`.
allowed_tables:
  - agent_events
  - agent_usage
  - agent_messages
  - agent_invocations
  - session_git_branch
  - ai_gateway_users
  - ai_gateway_groups
  - event_sources
  - plan_proposals
  - schema_migrations

# Word-boundary matched against the uppercased query - catches these
# anywhere (subqueries, CTEs), not just as the first keyword.
forbidden_keywords:
  - INSERT
  - UPDATE
  - DELETE
  - ALTER
  - DROP
  - TRUNCATE
  - CREATE
  - GRANT
  - REVOKE
  - ATTACH
  - DETACH
  - KILL
  - RENAME
  - OPTIMIZE
  - SYSTEM
  - EXCHANGE
  - RESTORE
  - BACKUP
  - SET

# Table functions reading outside the DB (files/URLs/other DBs) - always
# forbidden since they're function calls, not caught by the keyword list.
forbidden_table_functions:
  - REMOTE
  - REMOTESECURE
  - CLUSTER
  - CLUSTERALLREPLICAS
  - URL
  - FILE
  - S3
  - HDFS
  - MYSQL
  - POSTGRESQL
  - ODBC
  - JDBC
  - INPUT

max_rows_hard_cap: 1000
