# Queue between webhook (producer) and webhook-worker (consumer) - see
# services/webhook/src/queue_client.py. maxmemory bounds the worst case (a
# stuck worker/ClickHouse) instead of growing unboundedly; the stream's own
# MAXLEN (services/webhook/config.yml) is what actually keeps it there in
# practice - see AGENTS.md for the sizing math.
maxmemory 700mb
maxmemory-policy noeviction
appendonly yes
