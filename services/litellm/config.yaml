model_list:
  - model_name: claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-5
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
  - model_name: claude-fable-5
    litellm_params:
      model: anthropic/claude-fable-5
  # Forwards the caller's own `codex login` OAuth token instead of a shared
  # ChatGPT login - see custom_callbacks.py's "Codex/ChatGPT subscription
  # passthrough" section for why plain forward_client_headers can't do this.
  - model_name: gpt-5.6-sol
    litellm_params:
      model: chatgpt/gpt-5.6-sol
  - model_name: gpt-5.6-terra
    litellm_params:
      model: chatgpt/gpt-5.6-terra
  - model_name: gpt-5.6-luna
    litellm_params:
      model: chatgpt/gpt-5.6-luna

general_settings:
  store_model_in_db: true
  store_prompts_in_spend_logs: true

  # Admin credential for /ui and /key/generate - not for day-to-day calls.
  master_key: os.environ/LITELLM_MASTER_KEY

  # Personal virtual keys go in this header regardless of route (see
  # README.md "LiteLLM"). Needed for OAuth-backed routes too - without it
  # LiteLLM can't tell "authed to me" from "caller's own Anthropic cred,
  # forward it" and strips Authorization before forwarding (litellm#19618).
  litellm_key_header_name: x-litellm-api-key

model_group_settings:
  # Forwards caller's own Authorization (OAuth token) to Anthropic - if a
  # model here moves to a real api_key, remove its name too or its
  # credential could still get forwarded.
  forward_client_headers_to_llm_api:
    - claude-sonnet-5
    - claude-haiku-4-5
    - claude-haiku-4-5-20251001
    - claude-opus-4-8
    - claude-fable-5
    - gpt-5.6-sol
    - gpt-5.6-terra
    - gpt-5.6-luna

litellm_settings:
  # NOTE: bare `success_callback: ["webhook"]` fires LiteLLM's *alerting*
  # webhook (thin Slack-style pings), not this. `generic_api` ships the
  # full StandardLoggingPayload (messages, response, usage, cost) instead.
  callbacks:
    - metrics_webhook
    # Copies x-claude-code-session-id into metadata.session_id so Langfuse
    # groups traces by CLI session.
    - custom_callbacks.session_id_handler
    # Forwards a Codex caller's own ChatGPT token to gpt-5.6-* models
    # instead of a shared login.
    - custom_callbacks.chatgpt_auth_forward_handler
    # Exposes /metrics on this proxy port (4000); scraped by Prometheus's
    # litellm job.
    - prometheus

  # Built-in /metrics auth expects the Authorization header, but this
  # project authenticates via x-litellm-api-key instead, so it always
  # rejects as malformed. Scraped only over the internal Docker network;
  # /metrics carries no secrets, so disabling auth is the escape hatch.
  require_auth_for_metrics_endpoint: false

  # Native LiteLLM integration - reads LANGFUSE_* env vars, needs no
  # callback_settings block. Ships every call as a trace (messages,
  # cost/usage, latency) grouped by metadata.session_id.
  success_callback:
    - langfuse
  failure_callback:
    - langfuse

callback_settings:
  metrics_webhook:
    callback_type: generic_api
    # Internal DNS name; no host port needed since only litellm talks to it.
    endpoint: os.environ/WEBHOOK_URL
    headers:
      Content-Type: application/json
    event_types:
      - llm_api_success
      - llm_api_failure
    log_format: json_array
