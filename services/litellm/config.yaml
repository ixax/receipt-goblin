model_list:
  - model_name: claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-5
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5
  - model_name: claude-opus-4-8
    litellm_params:
      model: anthropic/claude-opus-4-8
  - model_name: claude-fable-5
    litellm_params:
      model: anthropic/claude-fable-5

general_settings:
  store_model_in_db: true
  store_prompts_in_spend_logs: true

  # Admin/master credential: logs into /ui and calls /key/generate to mint
  # per-person virtual keys. Not meant for day-to-day calls.
  master_key: os.environ/LITELLM_MASTER_KEY

  # Everyone's own personal LiteLLM virtual key goes in this SAME header
  # (x-litellm-api-key) regardless of which route they use, via
  # ANTHROPIC_CUSTOM_HEADERS (see README.md "LiteLLM"). For the OAuth-backed
  # routes above, this is also what lets LiteLLM tell "this authenticated to
  # me" apart from "this is the caller's own Anthropic credential, forward
  # it" - without it, LiteLLM can't tell the two apart and strips
  # Authorization before forwarding (see BerriAI/litellm#19618).
  litellm_key_header_name: x-litellm-api-key

model_group_settings:
  # Forwards the caller's own Authorization (subscription OAuth token) to
  # Anthropic - scoped to exactly the model_list entries above, so once
  # any of them moves to the admin UI (real api_key) instead, remove its name
  # from this list too, or a client's own credential could still get forwarded
  # for it depending on which definition LiteLLM picks up.
  forward_client_headers_to_llm_api:
    - claude-sonnet-5
    - claude-haiku-4-5
    - claude-haiku-4-5-20251001
    - claude-opus-4-8
    - claude-fable-5

litellm_settings:
  # NOTE: a bare `success_callback: ["webhook"]` fires LiteLLM's built-in
  # *alerting* webhook (Slack-style budget/error pings, thin payload) - not
  # what you want for inspecting full request/response JSON. `generic_api`
  # is the callback type that ships the full StandardLoggingPayload
  # (messages, response, usage, cost, timing, metadata) to your endpoint.
  callbacks: ["metrics_webhook"]

callback_settings:
  metrics_webhook:
    callback_type: generic_api
    # Internal service DNS name on the agent-tracking network - no host
    # port needed since only the litellm container talks to it.
    endpoint: os.environ/WEBHOOK_URL
    headers:
      Content-Type: application/json
    event_types:
      - llm_api_success
      - llm_api_failure
    log_format: json_array
