# Translated into GF_* env vars by docker-entrypoint.sh. GF_INSTALL_PLUGINS
# is an entrypoint-time install step, not a grafana.ini value - so this
# file, not docker-compose.yml, is the source of truth here.
install_plugins: grafana-clickhouse-datasource,marcusolsson-dynamictext-panel
auth_anonymous_enabled: "true"
auth_anonymous_org_role: Viewer
