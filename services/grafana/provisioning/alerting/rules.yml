apiVersion: 1

# No contact point wired up yet - these alert into Grafana's default
# receiver only (visible under Alerting > Alert rules), not delivered
# anywhere real. Add contactpoints.yml + a notification policy later.
groups:
  - orgId: 1
    name: infra-health
    folder: Alerts
    interval: 30s
    rules:
      - uid: alert-clickhouse-down
        title: ClickHouse is down
        condition: C
        for: 30s
        noDataState: NoData
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
              instant: true
              expr: 'up{job="clickhouse"} + on() probe_success{job="blackbox", instance=~".*clickhouse.*"}'
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator: {type: lt, params: [2]}
                  operator: {type: and}
                  query: {params: [B]}
                  reducer: {type: last, params: []}
                  type: query

      - uid: alert-webhook-down
        title: Webhook is down
        condition: C
        for: 30s
        noDataState: NoData
