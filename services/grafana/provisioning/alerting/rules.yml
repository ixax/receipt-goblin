      - uid: alert-redis-down
        title: Redis is down
        condition: C
        for: 30s
        noDataState: NoData
        execErrState: Error
        # No HTTP endpoint to blackbox-probe here - redis_exporter's own
        # up{job="redis"} is the only signal.
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: DS_PROMETHEUS
            model:
              refId: A
