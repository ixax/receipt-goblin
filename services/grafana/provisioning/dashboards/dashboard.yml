apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Not under /var/lib/grafana - that tree is shadowed by the
      # grafana-data named volume, so anything baked in there would
      # disappear. /etc/grafana isn't part of that volume.
      path: /etc/grafana/dashboards

  # Separate top-level mount, not a subdirectory of the default provider's
  # path - the file provisioner scans `path` recursively, and two providers
  # claiming the same file errors with "Cannot change resource manager
  # identity".
  - name: health
    orgId: 1
    folder: "Health"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards-health
